<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Gas Tracker 🟦</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'SF Mono', 'Monaco', monospace; 
            background: #0a0a0f; 
            color: #00ff88; 
            min-height: 100vh; 
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #0052ff; font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .gas-display {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }
        .gas-value { font-size: 48px; font-weight: bold; color: #00ff88; }
        .gas-unit { font-size: 20px; color: #666; }
        .gas-usd { font-size: 18px; color: #00fff5; margin-top: 10px; }
        .label { color: #666; font-size: 14px; margin-bottom: 5px; }
        .value { font-size: 24px; color: #fff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: #1a1a2e; border-radius: 12px; padding: 20px; }
        .card-label { color: #666; font-size: 12px; }
        .card-value { color: #fff; font-size: 18px; margin-top: 5px; }
        .update-time { color: #666; font-size: 12px; margin-top: 30px; text-align: center; }
        .loading { color: #ffe600; }
        .error { color: #ff2d63; }
        .alert-section { background: #1a1a2e; border-radius: 12px; padding: 20px; margin-top: 20px; }
        .alert-title { color: #fff; font-size: 16px; margin-bottom: 15px; }
        .alert-input-group { display: flex; gap: 10px; }
        .alert-input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #333; 
            border-radius: 8px; 
            background: #0a0a0f; 
            color: #00ff88; 
            font-size: 16px;
            font-family: inherit;
        }
        .alert-btn {
            padding: 12px 24px;
            background: #0052ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .alert-btn:hover { background: #0066ff; }
        .alert-active { 
            background: #1a3a2e; 
            border: 1px solid #00ff88; 
            padding: 15px; 
            border-radius: 8px; 
            margin-top: 15px;
            display: none;
        }
        .alert-active.show { display: block; }
        .alert-info { color: #00ff88; font-size: 14px; }
        .alert-triggered { 
            background: #3a1a2e; 
            border: 1px solid #ff2d63; 
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .remove-alert { 
            background: transparent; 
            border: 1px solid #ff2d63; 
            color: #ff2d63; 
            padding: 5px 10px; 
            border-radius: 5px; 
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🟦 Base Gas Tracker</h1>
        <p class="subtitle">Live gas prices on Base Network</p>
        
        <div class="gas-display">
            <div class="label">Current Gas Price</div>
            <div class="gas-value" id="gas">--</div>
            <div class="gas-unit">Gwei</div>
            <div class="gas-usd" id="gasUsd">~-- USD per transaction</div>
        </div>
        
        <div class="grid">
            <div class="card">
                <div class="card-label">ETH Price</div>
                <div class="card-value" id="ethPrice">--</div>
            </div>
            <div class="card">
                <div class="card-label">Last Update</div>
                <div class="card-value" id="time">--</div>
            </div>
        </div>
        
        <div class="update-time" id="updated">Loading...</div>
        
        <div class="alert-section">
            <div class="alert-title">🔔 Gas Alert</div>
            <div class="alert-input-group">
                <input type="number" class="alert-input" id="targetGas" placeholder="Target gas (Gwei)" step="0.0001">
                <button class="alert-btn" onclick="setAlert()">Set Alert</button>
            </div>
            <div class="alert-active" id="alertActive">
                <div class="alert-info">Alert set: &lt; <span id="targetValue">--</span> Gwei</div>
                <button class="remove-alert" onclick="removeAlert()">Remove</button>
            </div>
        </div>
    </div>

    <script>
        let currentGas = 0;
        let alertTriggered = false;
        
        // Load saved alert on startup
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('gasAlert');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('targetGas').value = data.target;
                showAlertState(data.target);
            }
        });
        
        function setAlert() {
            const target = parseFloat(document.getElementById('targetGas').value);
            if (!target || target <= 0) {
                alert('Please enter a valid gas price');
                return;
            }
            localStorage.setItem('gasAlert', JSON.stringify({ target: target, created: Date.now() }));
            showAlertState(target);
            checkAlert(currentGas);
        }
        
        function removeAlert() {
            localStorage.removeItem('gasAlert');
            document.getElementById('alertActive').classList.remove('show', 'alert-triggered');
            document.getElementById('targetGas').value = '';
            alertTriggered = false;
        }
        
        function showAlertState(target) {
            document.getElementById('targetValue').textContent = target.toFixed(4);
            document.getElementById('alertActive').classList.add('show');
        }
        
        function checkAlert(gas) {
            const saved = localStorage.getItem('gasAlert');
            if (!saved) return;
            
            const data = JSON.parse(saved);
            const target = data.target;
            
            if (gas < target && !alertTriggered) {
                alertTriggered = true;
                document.getElementById('alertActive').classList.add('alert-triggered');
                // Browser notification
                if (Notification.permission === 'granted') {
                    new Notification('Gas Alert!', { 
                        body: `Gas is now ${gas.toFixed(4)} Gwei (below ${target} Gwei)` 
                    });
                } else if (Notification.permission !== 'denied') {
                    Notification.requestPermission();
                }
            } else if (gas >= target) {
                alertTriggered = false;
                document.getElementById('alertActive').classList.remove('alert-triggered');
            }
        }
        
        async function fetchGas() {
            try {
                // Get gas price
                const gasResponse = await fetch('https://mainnet.base.org', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jsonrpc: '2.0',
                        method: 'eth_gasPrice',
                        params: [],
                        id: 1
                    })
                });
                const gasData = await gasResponse.json();
                
                // Get ETH price
                const priceResponse = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd');
                const priceData = await priceResponse.json();
                
                const gasWei = parseInt(gasData.result, 16);
                const gasGwei = gasWei / 1e9;
                currentGas = gasGwei; // Store for alert checking
                const ethPrice = priceData.ethereum.usd;
                
                // Calculate USD fee (21000 gas * gas price * ETH price)
                const feeUsd = (gasGwei * 1e9 * 21000 / 1e18) * ethPrice;
                
                document.getElementById('gas').textContent = gasGwei.toFixed(4);
                document.getElementById('gasUsd').textContent = '~$' + feeUsd.toFixed(4) + ' per tx';
                document.getElementById('ethPrice').textContent = '$' + ethPrice.toLocaleString();
                document.getElementById('time').textContent = new Date().toLocaleTimeString();
                document.getElementById('updated').textContent = 'Updated: ' + new Date().toLocaleString();
                
                // Check alert
                checkAlert(gasGwei);
                
            } catch (error) {
                document.getElementById('updated').innerHTML = '<span class="error">Error: ' + error.message + '</span>';
            }
        }
        
        fetchGas();
        setInterval(fetchGas, 30000); // Update every 30 seconds
    </script>
</body>
</html>
